<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>PONTUAL — Zenith Precision System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
  <button onclick="openTab('clock')">Relógio</button>
  <button onclick="openTab('alarm')">Alarme</button>
  <button onclick="openTab('chrono')">Cronômetro</button>
  <button onclick="openTab('pomodoro')">Pomodoro</button>
</nav>

<section id="clock" class="tab active">
  <h1 id="time"></h1>
</section>

<section id="alarm" class="tab">
  <h2>Alarme</h2>
  <input type="time" id="alarmTime">
  <button onclick="setAlarm()">Ativar</button>
  <button onclick="stopAlarm()">Parar</button>
  <p id="alarmStatus"></p>
</section>

<section id="chrono" class="tab">
  <h2>Cronômetro</h2>
  <h3 id="chronoTime">00:00:00</h3>
  <button onclick="startChrono()">Iniciar</button>
  <button onclick="stopChrono()">Parar</button>
  <button onclick="resetChrono()">Zerar</button>
</section>

<section id="pomodoro" class="tab">
  <h2>Pomodoro</h2>
  <h3 id="pomoTime">25:00</h3>
  <button onclick="startPomodoro()">Iniciar</button>
  <button onclick="resetPomodoro()">Resetar</button>
</section>

<script src="script.js"></script>
</body>
</html>
