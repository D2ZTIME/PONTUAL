<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONTUAL v4.0</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
<nav class="sidebar">
<button onclick="showTab('clock')">🕒</button>
<button onclick="showTab('alarms')">🔔</button>
<button onclick="showTab('stopwatch')">⏱️</button>
<button onclick="showTab('pomodoro')">🍅</button>
<button onclick="showTab('weather')">🌦️</button>
</nav>

<main>
<section id="clock" class="tab">
<h2>Relógio</h2>
<div id="time"></div>
</section>

<section id="alarms" class="tab hidden">
<h2>Alarmes</h2>
<input type="time" id="alarmTime">
<select id="alarmDay">
<option>Seg</option><option>Ter</option><option>Qua</option>
<option>Qui</option><option>Sex</option><option>Sab</option><option>Dom</option>
</select>
<button onclick="saveAlarm()">Salvar</button>
<ul id="alarmList"></ul>
</section>

<section id="stopwatch" class="tab hidden">
<h2>Cronômetro</h2>
<div id="sw">0.000</div>
<button onclick="startSW()">Start</button>
<button onclick="stopSW()">Stop</button>
<button onclick="resetSW()">Reset</button>
</section>

<section id="pomodoro" class="tab hidden">
<h2>Pomodoro</h2>
<p>Técnica de foco com ciclos de 25min trabalho + 5min pausa.</p>
<div id="pomo">25:00</div>
<button onclick="startPomo()">Iniciar</button>
</section>

<section id="weather" class="tab hidden">
<h2>Clima</h2>
<p>(API pronta para integração)</p>
<div id="weatherBox">Cidade padrão: São Paulo</div>
</section>
</main>
</div>

<audio id="alarmSound" src="alarm.mp3"></audio>
<script src="script.js"></script>
</body>
</html>
