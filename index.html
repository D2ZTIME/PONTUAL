<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PONTUAL v3.1</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>PONTUAL</h1>

<section>
<h2>Relógio Principal</h2>
<div id="time"></div>
</section>

<section>
<h2>Fusos Horários</h2>
<ul>
<li>São Paulo 🇧🇷 <span id="sp"></span></li>
<li>Nova York 🇺🇸 <span id="ny"></span></li>
<li>Londres 🇬🇧 <span id="ld"></span></li>
<li>Paris 🇫🇷 <span id="pa"></span></li>
<li>Tóquio 🇯🇵 <span id="tk"></span></li>
<li>Sydney 🇦🇺 <span id="sy"></span></li>
</ul>
</section>

<section>
<h2>Alarmes (até 6)</h2>
<div id="alarmsList"></div>
<button onclick="addAlarm()">Adicionar Alarme</button>
</section>

<section>
<h2>Cronômetro</h2>
<div id="sw">00:00.000</div>
<button onclick="startSW()">Start</button>
<button onclick="stopSW()">Stop</button>
<button onclick="resetSW()">Reset</button>
</section>

<section>
<h2>Pomodoro</h2>
<p>A técnica Pomodoro melhora o foco usando ciclos de 25 minutos de trabalho e 5 minutos de pausa.</p>
<div id="pomo">25:00</div>
<button onclick="startPomo()">Iniciar</button>
</section>

<script src="script.js"></script>
</body>
</html>
