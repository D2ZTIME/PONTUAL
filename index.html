<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PONTUAL | Dashboard de Produtividade</title>
    <meta name="description" content="Dashboard de produtividade e precisão temporal.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1;
            --bg: #030712;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #f9fafb;
            margin: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .font-mono-time {
            font-family: 'JetBrains Mono', monospace;
        }
        .glass {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-text {
            text-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
        }
        .neo-button-active {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
            border-color: rgba(99, 102, 241, 0.4) !important;
        }
        @keyframes aura {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
            50% { transform: translate(-48%, -52%) scale(1.1); opacity: 0.15; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0.1; }
        }
        .aura {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            z-index: -1;
            animation: aura 10s ease-in-out infinite;
            filter: blur(80px);
            pointer-events: none;
        }
        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
